name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts (Hardhat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./contracts/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx hardhat compile
      - run: npx hardhat test

  slither:
    name: Slither (Contracts)
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./contracts/package-lock.json
      - name: Install + compile contracts
        working-directory: ./contracts
        run: npm ci --legacy-peer-deps && npx hardhat compile
      - name: Run Slither analyzer
        uses: crytic/slither-action@v0.4.2
        with:
          target: contracts/
          slither-args: --filter-paths "node_modules"
          fail-on: high
          ignore-compile: true

  app:
    name: App (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./app/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - run: npm test

  enclave:
    name: Enclave (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./enclave
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./enclave/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
