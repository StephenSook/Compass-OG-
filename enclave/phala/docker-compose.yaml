# Phala dstack docker-compose for Compass enclave.
# Deploy via Phala Cloud dashboard or local dstack-vmm.
#
# /var/run/dstack.sock mount triggers TEE-mode boot: server derives
# secp256k1 receipt-signer key inside the enclave via dstack getKey, then
# requests a TDX quote whose report_data commits to (ethAddress ||
# composeHash). Verifier extracts and confirms the binding.
services:
  compass-enclave:
    # Pinned by digest so Phala pulls the exact image we built locally,
    # not whatever floats at :1.0.0 over time. Re-pin on every rebuild.
    image: ghcr.io/stephensook/compass-enclave:1.0.1@sha256:f11923f9295b4bb377687083e9bd36cb92bc7a46a2b68fe14a91d05cc4e7939d
    ports:
      - "8080:8080"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    environment:
      COMPASS_BIND_HOST: 0.0.0.0
    restart: always
