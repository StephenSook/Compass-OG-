# Phala dstack docker-compose for Compass enclave.
# Deploy via Phala Cloud dashboard or local dstack-vmm.
#
# /var/run/dstack.sock mount triggers TEE-mode boot: server derives
# secp256k1 receipt-signer key inside the enclave via dstack getKey, then
# requests a TDX quote whose report_data commits to (ethAddress ||
# composeHash). Verifier extracts and confirms the binding.
services:
  compass-enclave:
    image: compass-enclave:latest
    build:
      context: ..
      dockerfile: phala/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    environment:
      COMPASS_BIND_HOST: 0.0.0.0
      # Compass-side config; signer key is NOT here — derived inside enclave.
      COMPASS_POLICY_REGISTRY_URL: ${COMPASS_POLICY_REGISTRY_URL}
      COMPASS_TRUST_LIST_ROOT: ${COMPASS_TRUST_LIST_ROOT}
      COMPASS_AGENT_REGISTRY_ADDR: ${COMPASS_AGENT_REGISTRY_ADDR}
      COMPASS_HUB_ADDR: ${COMPASS_HUB_ADDR}
      ZEROG_RPC_URL: ${ZEROG_RPC_URL}
    restart: always
